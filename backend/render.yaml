# Render Blueprint for NyayaAI Backend
# ======================================
# Deploy to Render free tier: https://render.com

services:
  - type: web
    name: nyayaai-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: MODEL_NAME
        value: mistralai/ministral-3b-2512
      - key: FAST_MODEL_CANDIDATES
        value: mistralai/ministral-8b-2512,mistralai/mistral-7b-instruct-v0.1
      - key: LLM_MAX_TOKENS
        value: "384"
      - key: TOP_K
        value: "2"
      - key: OPENROUTER_TIMEOUT_SECONDS
        value: "45"
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
    autoDeploy: true
